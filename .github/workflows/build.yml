name: GameBoosterPro Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Assemble Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Generate Debug Keystore
      run: |
        mkdir -p app
        keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Make Gradle Wrap Executable
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        fi

    - name: Build Debug Binary with Gradle
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug
        else
          gradle assembleDebug
        fi

    - name: Upload Compiled APK Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: game-booster-pro-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
